<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<div style="display:flex;flex-direction:column;height:100vh;padding:1.5rem;gap:1rem;font-family:-apple-system,sans-serif;background:#1a1a2e;color:#fff">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <div style="font-size:1.5rem;font-weight:700">Dashboard</div>
    <div id="u" style="font-size:0.75rem;opacity:0.5"></div>
  </div>
  <div id="cards" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(11rem,1fr));gap:0.75rem"></div>
  <div style="flex:1;min-height:0;background:#16213e;border-radius:0.75rem;padding:1rem"><canvas id="ch"></canvas></div>
</div>
<script>
var chart=null;
function loadData(){
  fetch("https://sheets.googleapis.com/v4/spreadsheets/YOUR_SPREADSHEET_ID/values/YOUR_RANGE?key=YOUR_API_KEY")
  .then(function(r){return r.json()})
  .then(function(j){
    if(!j.values||j.values.length<2)return;
    var h=j.values[0];
    var data=j.values.slice(1).map(function(r){var o={};h.forEach(function(k,i){o[k]=isNaN(r[i])?r[i]:Number(r[i])});return o;});
    var k=Object.keys(data[0]).filter(function(x){return x!=="mes"&&typeof data[0][x]==="number"});
    var tot={};k.forEach(function(x){tot[x]=data.reduce(function(s,r){return s+(Number(r[x])||0)},0)});
    document.getElementById("cards").innerHTML=k.map(function(x){
      return '<div style="background:#16213e;border-radius:0.75rem;padding:1rem;text-align:center"><div style="font-size:0.8rem;opacity:0.6">'+x+'</div><div style="font-size:2rem;font-weight:700;margin-top:0.25rem;color:#4ade80">'+Number(tot[x]).toLocaleString()+'</div></div>'
    }).join("");
    var labels=data.map(function(r){return r.mes});
    var colors=["rgba(74,124,255,0.5)","rgba(255,107,107,0.5)","rgba(74,255,128,0.5)"];
    var bdr=["#4a7cff","#ff6b6b","#4ade80"];
    ds=k.map(function(x,i){return{label:x,data:data.map(function(r){return Number(r[x])||0}),backgroundColor:colors[i%3],borderColor:bdr[i%3],borderWidth:2,borderRadius:4}});
    if(chart){chart.data.labels=labels;chart.data.datasets=ds;chart.update("none")}
    else{chart=new Chart(document.getElementById("ch"),{type:"bar",data:{labels:labels,datasets:ds},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#fff"}}},scales:{x:{ticks:{color:"#fff8"},grid:{color:"#fff2"}},y:{beginAtZero:true,ticks:{color:"#fff8"},grid:{color:"#fff2"}}}}})}
    document.getElementById("u").textContent="Actualizado: "+new Date().toLocaleTimeString("es-MX");
  }).catch(function(e){document.getElementById("u").textContent="Error: "+e.message})
}
loadData();setInterval(loadData,10000);
</script>
